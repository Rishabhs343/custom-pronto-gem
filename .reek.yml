---
# Reek config for pronto-rubycritic.
#
# We disable several detectors that fire on idioms common in a Pronto runner:
#   - NilCheck: we defensively guard against nil RubyCritic return values.
#   - ManualDispatch: respond_to? checks are the contract with RubyCritic's
#     duck-typed Smell and AnalysedModule.
#   - ControlParameter / FeatureEnvy / DataClump: the SmellFilter is
#     config-driven; the "flaws" reek detects here are intentional DI.
#   - DuplicateMethodCall / RepeatedConditional: few, small, and not worth
#     extraction cost for a 120-line class.
#
# Post-1.0 follow-up: re-enable FeatureEnvy and look for real design wins.
detectors:
  IrresponsibleModule:
    enabled: false
  NilCheck:
    enabled: false
  ManualDispatch:
    enabled: false
  ControlParameter:
    enabled: false
  FeatureEnvy:
    enabled: false
  UtilityFunction:
    enabled: false
  DataClump:
    enabled: false
  DuplicateMethodCall:
    enabled: false
  RepeatedConditional:
    enabled: false
  TooManyInstanceVariables:
    max_instance_variables: 6
  TooManyConstants:
    max_constants: 10
  TooManyStatements:
    max_statements: 12
  NestedIterators:
    max_allowed_nesting: 2
  LongParameterList:
    max_params: 6
  UncommunicativeVariableName:
    accept:
      - e   # exception object in rescue
      - p   # patch in each/map block
      - l   # line in each/find block
      - s   # smell in each/select/reject block
      - v   # value in generic iteration
      - k   # key in each_with_object

exclude_paths:
  - spec
  - tmp
  - coverage
  - pkg
  - vendor
